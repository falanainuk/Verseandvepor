<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verse & Vapor Admin</title>
  <link href="favicon.png" rel="icon" type="image/png" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .admin-panel {
      width: 100%;
      max-width: 900px;
      padding: 24px;
      background: rgba(0,0,0,.9);
      border: 1px solid #333;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    h1 {
      margin-top: 0;
      font-size: 32px;
      text-align: center;
    }
    #data-container {
      margin-top: 24px;
    }
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 14px 22px;
      font-size: 16px;
      background: #1a73e8;
      color: white;
    }
    .note {
      color: #bbb;
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="admin-panel">
    <h1>Verse & Vapor Admin</h1>
    <p style="text-align:center; color:#ccc;">This page is for admin Google Sheet access only.</p>
    <div id="data-container"></div>
    <p class="note">Use this page to sign in as the admin and manage your Google Sheet data. The public homepage will not show this panel.</p>
  </div>
  <script src="assets/sheets-integration.js"></script>
</body>
</html>
